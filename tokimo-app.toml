# Tokimo app manifest
[app]
id          = "apple-music"
display     = "Apple Music"
version     = "0.1.0"
description = "Apple Music 播放与订阅管理（多进程 app，方案 3：内嵌 axum + UDS）"

[runtime]
lifecycle    = "resident"
binary       = "tokimo-app-apple-music"
ui_dist      = "ui/dist"
# apple-music 不持有自己的表，user_preferences 通过 server /openapi 调用
# binary 完全无 DB 依赖

[ui]
entry        = "assets/index.js"
window_type  = "apple-music"
category     = "app"
icon         = "ListMusic"
image        = "icon.png"
color        = "#fa233b"
width        = 1100
height       = 720
title_bar_style = "overlay"
full_bleed   = true
background    = true

[cli]
name = "tokimo-app-apple-music"
description = "Query Apple Music songs and albums, and download them to local cache."

[skills]
dir = "skills"