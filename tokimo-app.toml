# Tokimo app manifest
[app]
id          = "apple-music"
display     = "Apple Music"
version     = "0.1.0"
description = "Apple Music 播放与订阅管理（多进程 app，方案 3：内嵌 axum + UDS）"

[runtime]
lifecycle    = "resident"
binary       = "tokimo-app-apple-music"
ui_dist      = "ui/dist"
# apple-music 不持有自己的表，user_preferences 通过 server /openapi 调用
# binary 完全无 DB 依赖

[ui]
entry        = "assets/index.js"
window_type  = "apple-music"
category     = "app"
icon         = "ListMusic"
image        = "icon.png"
color        = "#fa233b"
width        = 1100
height       = 720
title_bar_style = "overlay"
full_bleed   = true

[cli]
name = "apple-music"
description = """\
Query Apple Music catalog (songs, albums) for the current user. Subcommands:
  status                          — verify auth + show user_id
  search <query> [opts]           — search the Apple Music catalog
      --types <csv>   default \"songs,albums\" (also: artists, playlists)
      --limit <n>     per-type cap, default 25
      --page  <n>     1-based page, default 1
  album <album_id> [--raw]        — fetch album metadata + full track listing
                                    (use --raw to dump the underlying JSON)
  download <track_id> [opts]      — download + decrypt a single track to disk
      --output <path> file or directory, default \".\"
      --quality <q>   lossless | high | standard, default \"high\"
IDs are Apple Music catalog IDs (numeric strings, e.g. 1887230874). The user
must first sign in to the Apple Music app once so that music-user-token +
storefront are saved to user_preferences. The agent's --tokimo-token is
auto-injected by the sandbox bridge; do not pass it manually.
"""
